<!DOCTYPE html>
<html>
<head>
  <title>License Panel</title>
</head>
<body style="font-family: Arial; padding: 20px;">

  <h2>Key Validation Test</h2>

  <input id="key" placeholder="Enter Key" />
  <input id="device" placeholder="Device ID" />
  <button onclick="validate()">Validate</button>

  <pre id="result"></pre>

  <script>
    async function validate() {
      const key = document.getElementById("key").value;
      const device_id = document.getElementById("device").value;

      const res = await fetch("/api/keys/validate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ key, device_id })
      });

      const data = await res.json();
      document.getElementById("result").innerText =
        JSON.stringify(data, null, 2);
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Dashboard</h2>

<input id="key" placeholder="Key">
<input id="expiry" placeholder="Expiry">
<input id="limit" placeholder="Device limit">

<button onclick="create()">Create</button>

<hr>

<button onclick="load()">Load Keys</button>

<pre id="out"></pre>

<script>
async function create() {
  await fetch("/api/admin/create-key", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      key: document.getElementById("key").value,
      expiry_date: document.getElementById("expiry").value,
      device_limit: Number(document.getElementById("limit").value)
    })
  });

  alert("Created");
}

async function load() {
  const res = await fetch("/api/admin/keys");
  const data = await res.json();
  document.getElementById("out").innerText =
    JSON.stringify(data, null, 2);
}

load();
</script>

</body>
</html>
